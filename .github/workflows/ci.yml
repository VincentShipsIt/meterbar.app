name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app and widget
        run: |
          xcodebuild -project MeterBar.xcodeproj \
            -scheme MeterBar \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build CLI
        run: |
          cd MeterBarCLI
          swift build

  # The unit tests live in a SwiftPM test target (Package.swift), not the Xcode
  # project — `xcodebuild test` on the MeterBar scheme never ran them. Run them
  # via `swift test` with the coverage gate. Credential-dependent integration
  # tests XCTSkip themselves on CI, so a failure here is a real failure.
  test:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Run tests with coverage gate
        run: ./scripts/check-coverage.sh
        env:
          # Coverage floor for the SPM library target. Ratchet upward as
          # view-model and CostTracker coverage grows toward the 80% policy.
          COVERAGE_THRESHOLD: "40"
